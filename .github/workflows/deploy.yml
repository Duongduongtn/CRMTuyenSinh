name: Deploy CRM Tuyen Sinh

# Trigger:
#   - Push len main (tu dong).
#   - Manual dispatch (chay tay khi can rollback / re-deploy).
#   - Last re-run: nhanh T (after user removed AAAA record 2026-06-11).
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.claude/**'
  workflow_dispatch:

# Khong cancel deploy dang chay - tranh deploy nua chung gay corrupt.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # -------------------------------------------------------------------
  # 1. Backend test - Django test suite, fail fast.
  # -------------------------------------------------------------------
  backend-test:
    name: Backend Django tests
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_test
          POSTGRES_PASSWORD: crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps cho weasyprint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf-2.0-0 \
            fonts-noto-core

      - name: Install Python deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          DJANGO_SECRET_KEY: ci-test-secret-key-must-be-at-least-32-chars
          DATABASE_URL: postgres://crm_test:crm_test@localhost:5432/crm_test
          CELERY_TASK_ALWAYS_EAGER: "True"
        run: python manage.py test --noinput -v 2

  # -------------------------------------------------------------------
  # 2. Frontend CRM build - vue-tsc check + Vite build, upload dist artifact.
  # -------------------------------------------------------------------
  frontend-crm-build:
    name: Frontend CRM build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend-crm/pnpm-lock.yaml

      - name: Install deps
        working-directory: frontend-crm
        run: pnpm install --frozen-lockfile

      - name: Type check (vue-tsc)
        working-directory: frontend-crm
        run: pnpm exec vue-tsc --noEmit

      - name: Build (Vite production)
        working-directory: frontend-crm
        env:
          VITE_API_BASE: https://sale.trungtamthanhdat.com
        run: pnpm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-crm-dist
          path: frontend-crm/dist/
          retention-days: 7

  # -------------------------------------------------------------------
  # 3. Frontend Public (Nuxt 3 hybrid SSR) build.
  #    `nuxt build` voi preset node-server -> xuat `.output/server/index.mjs`
  #    + `.output/public/` (prerender). Rsync ca cay .output len VPS, docker
  #    service `frontend-public-ssr` mount va spawn `node server/index.mjs`.
  # -------------------------------------------------------------------
  frontend-public-build:
    name: Frontend Public hybrid SSR build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend-public/pnpm-lock.yaml

      - name: Install deps
        working-directory: frontend-public
        run: pnpm install --frozen-lockfile

      - name: Build (Nuxt 3 hybrid, preset node-server)
        working-directory: frontend-public
        env:
          NUXT_PUBLIC_API_BASE: https://sale.trungtamthanhdat.com/api
          NUXT_PUBLIC_SITE_URL: https://trungtamthanhdat.com
          NUXT_PUBLIC_STUDENT_URL: https://hocvien.trungtamthanhdat.com
          NITRO_PRESET: node-server
        run: pnpm run build

      - name: Verify .output xuat hien
        working-directory: frontend-public
        run: |
          if [ ! -f .output/server/index.mjs ]; then
            echo "FAIL: .output/server/index.mjs khong ton tai sau build"
            echo "--- ls -la .output:"
            ls -la .output 2>&1 || echo "(folder .output khong ton tai)"
            echo "--- ls -la .output/server:"
            ls -la .output/server 2>&1 || true
            echo "--- ls -la .output/public:"
            ls -la .output/public 2>&1 || true
            exit 1
          fi
          echo "OK: .output/server/index.mjs ($(stat -c '%s' .output/server/index.mjs) bytes)"
          echo "Public files: $(find .output/public -type f | wc -l)"

      - name: Upload .output artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-public-output
          path: frontend-public/.output/
          if-no-files-found: error
          retention-days: 7
          # Folder co dotfile (.gitkeep, ...). Default upload-artifact v4 exclude
          # paths bat dau bang dot -> them include-hidden de giu nguyen.
          include-hidden-files: true

  # -------------------------------------------------------------------
  # 4. Frontend Student (PWA hoc vien) build - Nuxt 3 SPA mode (ssr: false).
  #    `nuxt generate` xuat static .output/public/ -> rsync len nginx serve.
  # -------------------------------------------------------------------
  frontend-student-build:
    name: Frontend Student PWA build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend-student/pnpm-lock.yaml

      - name: Install deps
        working-directory: frontend-student
        run: pnpm install --frozen-lockfile

      - name: Generate (Nuxt SPA static)
        working-directory: frontend-student
        env:
          NUXT_PUBLIC_API_BASE: https://sale.trungtamthanhdat.com/api
          NUXT_PUBLIC_PUBLIC_URL: https://hocvien.trungtamthanhdat.com
        run: pnpm run generate

      - name: Upload .output/public artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-student-dist
          path: frontend-student/.output/public/
          retention-days: 7

  # -------------------------------------------------------------------
  # 5. Deploy - SSH vao VPS, pull code, rebuild backend container,
  #    rsync 3 FE dist (CRM + PWA hoc vien + Public SSR) len cac thu muc.
  # -------------------------------------------------------------------
  deploy:
    name: Deploy len VPS
    needs: [backend-test, frontend-crm-build, frontend-public-build, frontend-student-build]
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://sale.trungtamthanhdat.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Trust VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Download FE CRM dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-crm-dist
          path: /tmp/frontend-crm-dist/

      - name: Download FE Student PWA dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-student-dist
          path: /tmp/frontend-student-dist/

      - name: Download FE Public hybrid SSR output artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-public-output
          path: /tmp/frontend-public-output/

      - name: SSH deploy backend (git pull + docker compose build/up + migrate)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" bash -se <<'EOF'
          set -euo pipefail
          cd /var/www/thanhdat

          # Pull code qua deploy key alias github-thanhdat (config trong /root/.ssh/config).
          if [ ! -d .git ]; then
            git clone --depth 1 git@github-thanhdat:Duongduongtn/CRMTuyenSinh.git .
          else
            git fetch origin main
            git reset --hard origin/main
          fi

          # Tao thu muc bind mount neu chua co.
          mkdir -p /var/www/thanhdat/backend-media /var/www/thanhdat/backend-static
          mkdir -p /var/www/thanhdat/frontend-crm/dist
          # PWA hoc vien: nginx tro root vao .output/public (xem hocvien.*.conf:43).
          mkdir -p /var/www/thanhdat/frontend-student/.output/public
          # FE public: docker service mount .output (server + public).
          mkdir -p /var/www/thanhdat/frontend-public/.output

          # Build backend image (cache layer requirements.txt -> rebuild nhanh khi chi doi code).
          # --env-file .env.prod can thiet de substitution ${POSTGRES_DB} hoat dong trong compose file.
          cd infra
          docker compose --env-file .env.prod -f docker-compose.prod.yml build backend

          # Migrate truoc khi swap container (giam downtime).
          docker compose --env-file .env.prod -f docker-compose.prod.yml run --rm backend python manage.py migrate --noinput

          # Up tat ca service (recreate neu image moi).
          docker compose --env-file .env.prod -f docker-compose.prod.yml up -d

          # Health check backend trong 30s.
          for i in 1 2 3 4 5 6; do
            if curl -fsS http://127.0.0.1:8003/admin/login/ > /dev/null 2>&1; then
              echo "Backend up OK"
              break
            fi
            echo "Cho backend... ($i/6)"
            sleep 5
          done

          # Dam bao collectstatic chay (output sang bind mount).
          docker compose --env-file .env.prod -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput
          EOF

      - name: Rsync FE CRM dist len VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          rsync -avz --delete --no-times \
            -e "ssh -o StrictHostKeyChecking=accept-new" \
            /tmp/frontend-crm-dist/ \
            "${VPS_USER}@${VPS_HOST}:/var/www/thanhdat/frontend-crm/dist/"

      - name: Rsync FE Student PWA dist len VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          rsync -avz --delete --no-times \
            -e "ssh -o StrictHostKeyChecking=accept-new" \
            /tmp/frontend-student-dist/ \
            "${VPS_USER}@${VPS_HOST}:/var/www/thanhdat/frontend-student/.output/public/"

      - name: Rsync FE Public hybrid SSR output len VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          rsync -avz --delete --no-times \
            -e "ssh -o StrictHostKeyChecking=accept-new" \
            /tmp/frontend-public-output/ \
            "${VPS_USER}@${VPS_HOST}:/var/www/thanhdat/frontend-public/.output/"

      - name: Bootstrap SSL apex trungtamthanhdat.com (idempotent)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          # Email cho Let's Encrypt notify het han (90 ngay). Doi sang email anh quan ly khi can.
          CERT_EMAIL: admin@trungtamthanhdat.com
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" bash -se <<'EOF'
          set -euo pipefail

          CERT_DIR=/etc/letsencrypt/live/trungtamthanhdat.com
          VHOST_FULL=/etc/nginx/sites-enabled/trungtamthanhdat.com
          VHOST_BOOTSTRAP=/etc/nginx/sites-enabled/trungtamthanhdat.com.bootstrap

          # KHONG early-exit khi cert + vhost da co - de luon chay debug step 4
          # dump nginx -T tim vhost conflict (vntmedia claim domain).
          # Step 1+2 (bootstrap vhost + certbot) co condition rieng `if [ ! -f cert ]`
          # tu nhien skip neu cert da co. Step 3 swap idempotent (ln -sf).

          mkdir -p /var/www/certbot/.well-known/acme-challenge
          chmod -R a+rX /var/www/certbot

          # 1. Bootstrap vhost HTTP-only de pass ACME challenge.
          if [ ! -f "$CERT_DIR/fullchain.pem" ]; then
            cat > /etc/nginx/sites-available/trungtamthanhdat.com.bootstrap <<'NGINX'
          server {
              listen 80;
              listen [::]:80;
              server_name trungtamthanhdat.com www.trungtamthanhdat.com;
              location /.well-known/acme-challenge/ {
                  root /var/www/certbot;
                  default_type "text/plain";
                  allow all;
              }
              location / { return 404; }
          }
          NGINX
            ln -sf /etc/nginx/sites-available/trungtamthanhdat.com.bootstrap "$VHOST_BOOTSTRAP"
            nginx -t && systemctl reload nginx

            # 1b. SELF-TEST ACME challenge truoc khi goi certbot (tranh rate limit Let's Encrypt).
            # Drop 1 file test, curl qua IPv4 va IPv6 local interface voi Host header apex.
            # Neu ca 2 deu fail -> dump config + sites-enabled + nginx -T grep, exit fail
            # ngay thay vi de certbot consume 1 lan rate limit.
            TEST_TOKEN="self-test-$(date +%s)-$$"
            echo -n "$TEST_TOKEN" > "/var/www/certbot/.well-known/acme-challenge/$TEST_TOKEN"
            chmod a+r "/var/www/certbot/.well-known/acme-challenge/$TEST_TOKEN"
            sync

            # `--resolve` ep curl ket noi den 127.0.0.1 hoac ::1 voi Host: trungtamthanhdat.com.
            # CHU Y cu phap IPv6: KHONG dung brackets `[::1]` vi curl < 7.77 (Ubuntu 20.04
            # default 7.68) reject. Dung 3 dau `:` lien sau port: `host:port:::1`. Ubuntu
            # 22.04 (curl 7.81) accept ca 2.
            IPV4_RESP=$(curl -sS --max-time 5 \
              --resolve "trungtamthanhdat.com:80:127.0.0.1" \
              "http://trungtamthanhdat.com/.well-known/acme-challenge/$TEST_TOKEN" 2>&1 || echo "<curl-error>")
            IPV6_RESP=$(curl -sS --max-time 5 \
              --resolve "trungtamthanhdat.com:80:::1" \
              "http://trungtamthanhdat.com/.well-known/acme-challenge/$TEST_TOKEN" 2>&1 || echo "<curl-error>")

            echo "=== Self-test ACME challenge ==="
            echo "Expected token: $TEST_TOKEN"
            echo "IPv4 (127.0.0.1) response: '$IPV4_RESP'"
            echo "IPv6 (::1) response: '$IPV6_RESP'"

            IPV4_OK=0; IPV6_OK=0
            [ "$IPV4_RESP" = "$TEST_TOKEN" ] && IPV4_OK=1
            [ "$IPV6_RESP" = "$TEST_TOKEN" ] && IPV6_OK=1

            if [ "$IPV4_OK" = "0" ] && [ "$IPV6_OK" = "0" ]; then
              echo "=== FAIL: Vhost bootstrap khong serve duoc ACME challenge tu localhost ==="
              echo "--- Bootstrap vhost config:"
              cat /etc/nginx/sites-available/trungtamthanhdat.com.bootstrap
              echo "--- sites-enabled (filter trungtam):"
              ls -la /etc/nginx/sites-enabled/ | grep -i trungtam || echo "(khong co)"
              echo "--- nginx -T grep apex (10 dong context):"
              nginx -T 2>/dev/null | grep -B 2 -A 10 'server_name trungtamthanhdat\.com' || echo "(khong tim thay)"
              echo "--- nginx default_server count + listen:"
              nginx -T 2>/dev/null | grep -E 'listen.*default_server' | head -10 || echo "(khong co default_server)"
              echo "--- ss -tlnp port 80:"
              ss -tlnp 2>/dev/null | grep ':80 ' || echo "(khong thay port 80)"
              echo "--- file test path:"
              ls -la "/var/www/certbot/.well-known/acme-challenge/$TEST_TOKEN" 2>&1 || true
              echo "--- /var/www permission chain:"
              namei -m "/var/www/certbot/.well-known/acme-challenge/$TEST_TOKEN" 2>&1 || true
              rm -f "/var/www/certbot/.well-known/acme-challenge/$TEST_TOKEN"
              exit 1
            fi

            if [ "$IPV6_OK" = "0" ]; then
              echo "=== WARNING: IPv4 serve OK nhung IPv6 fail ==="
              echo "Let's Encrypt UU TIEN IPv6 khi DNS co AAAA record."
              echo "Neu apex co AAAA record (dig AAAA trungtamthanhdat.com tra ket qua) thi"
              echo "certbot SE FAIL vi ACME server hit IPv6 endpoint khong serve duoc."
              echo "--- DNS AAAA hien tai (tu VPS):"
              dig +short AAAA trungtamthanhdat.com 2>&1 | head -3 || echo "(khong dig duoc)"
              echo "--- VPS IPv6 interface global:"
              ip -6 addr show scope global 2>&1 | grep -E 'inet6|^[0-9]+:' | head -10 || true
              echo "--- ss -tlnp port 80:"
              ss -tlnp 2>/dev/null | grep ':80 ' || echo "(khong thay port 80)"
              echo "--- ip6tables INPUT chain (port 80 rule):"
              ip6tables -L INPUT -n 2>/dev/null | grep -E '80|tcp|policy' | head -10 || \
                nft list ruleset 2>/dev/null | grep -B 1 -A 3 'tcp dport 80' | head -15 || \
                echo "(khong xem duoc firewall)"
              echo "--- nginx vhost catch-all IPv6:"
              nginx -T 2>/dev/null | grep -E 'listen.*\[::\].*default_server' | head -5 || \
                echo "(khong co default_server IPv6)"
              echo ""
              echo "DUNG van tiep tuc certbot vi co the certbot dung HTTP-01 IPv4."
            fi
            echo "OK self-test pass (IPv4=$IPV4_OK, IPv6=$IPV6_OK)."
            rm -f "/var/www/certbot/.well-known/acme-challenge/$TEST_TOKEN"

            # 2. Cap cert Let's Encrypt cho apex + www (1 cert).
            certbot certonly --webroot -w /var/www/certbot \
              -d trungtamthanhdat.com -d www.trungtamthanhdat.com \
              --email "${CERT_EMAIL:-admin@trungtamthanhdat.com}" \
              --agree-tos --no-eff-email --non-interactive
          fi

          # 3. Swap sang vhost full SSL.
          rm -f "$VHOST_BOOTSTRAP"
          ln -sf /var/www/thanhdat/infra/nginx/trungtamthanhdat.com.conf "$VHOST_FULL"
          nginx -t && systemctl reload nginx
          echo "Bootstrap SSL apex hoan tat."

          # 4. DEBUG: dump nginx config thuc te de phat hien vhost project khac
          # (vntmedia/cemacosg/...) co the dang claim server_name trungtamthanhdat.com
          # hoac default_server SSL 443.
          echo ""
          echo "=== DEBUG: All server blocks match trungtamthanhdat ==="
          nginx -T 2>/dev/null | awk '
            /^[[:space:]]*server[[:space:]]*\{/ { inserver=1; buf=""; matched=0 }
            inserver {
              buf=buf $0 "\n"
              if (/server_name.*trungtamthanhdat/ || /server_name[[:space:]]+_[;[:space:]]/) matched=1
            }
            /^[[:space:]]*\}[[:space:]]*$/ && inserver {
              if (matched) print buf "----"
              inserver=0
            }
          '

          echo ""
          echo "=== DEBUG: default_server o port 443 ==="
          nginx -T 2>/dev/null | grep -B 5 'default_server' | grep -E 'listen.*443.*default_server|server_name' | head -20

          echo ""
          echo "=== DEBUG: sites-enabled symlinks ==="
          ls -la /etc/nginx/sites-enabled/ | grep -iE 'trungtam|vntmedia|cemacosg|default'

          echo ""
          echo "=== DEBUG: cert SAN cho apex ==="
          openssl x509 -in /etc/letsencrypt/live/trungtamthanhdat.com/fullchain.pem -noout -subject -ext subjectAltName 2>&1 || true
          EOF

      - name: Restart FE Public SSR service (reload Node process voi code moi)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" bash -se <<'EOF'
          set -euo pipefail
          cd /var/www/thanhdat/infra

          # Dam bao container cu (neu co tu CI fail truoc voi port 3004) duoc stop
          # va remove de tranh port linger. Lan dau khong co container -> rm fail
          # silent (|| true).
          docker compose --env-file .env.prod -f docker-compose.prod.yml rm -sf frontend-public-ssr 2>/dev/null || true

          # Verify port 3104 free truoc khi up. Neu chiem boi project khac, log
          # process roi exit fail som de khong burn CI thoi gian doi.
          if ss -tlnp 2>/dev/null | grep -qE '127\.0\.0\.1:3104 |0\.0\.0\.0:3104 |\[::\]:3104 '; then
            echo "FAIL: port 3104 da bi chiem."
            echo "--- ss -tlnp grep 3104:"
            ss -tlnp 2>/dev/null | grep 3104
            echo "--- docker ps with port 3104:"
            docker ps --format 'table {{.Names}}\t{{.Ports}}' | grep 3104 || echo "(khong phai docker)"
            exit 1
          fi

          # `up -d` se tao service neu chua co (lan dau), idempotent neu da co.
          docker compose --env-file .env.prod -f docker-compose.prod.yml up -d frontend-public-ssr
          # `restart` de Node process pick up artifact moi (mount read-only).
          docker compose --env-file .env.prod -f docker-compose.prod.yml restart frontend-public-ssr

          # Cho Node SSR boot 5s truoc khi smoke test ben ngoai.
          sleep 5
          EOF

      - name: Smoke test HTTPS
        run: |
          # Check BE health (chap nhan 200/401/403 - tat ca deu chung to BE alive).
          # URL pattern apps/core/urls.py la "site-settings" KHONG trailing slash.
          # Django KHONG auto-strip slash (APPEND_SLASH chi append, khong strip).
          BE_CODE=$(curl --max-time 10 -sS -o /dev/null -w "%{http_code}" \
            https://sale.trungtamthanhdat.com/api/site-settings)
          echo "BE site-settings: $BE_CODE"
          case "$BE_CODE" in
            200|401|403) echo "BE OK";;
            *) echo "BE FAIL: $BE_CODE"; exit 1;;
          esac

          # Check FE CRM serve (200 mong doi).
          FE_CODE=$(curl --max-time 10 -sS -o /dev/null -w "%{http_code}" \
            https://sale.trungtamthanhdat.com/)
          echo "FE CRM /: $FE_CODE"
          [ "$FE_CODE" = "200" ] || { echo "FE CRM FAIL"; exit 1; }

          # Check PWA hoc vien serve (200 mong doi sau rsync .output/public).
          HV_CODE=$(curl --max-time 10 -sS -o /dev/null -w "%{http_code}" \
            https://hocvien.trungtamthanhdat.com/)
          echo "PWA hocvien /: $HV_CODE"
          [ "$HV_CODE" = "200" ] || { echo "PWA hocvien FAIL"; exit 1; }

          # Check FE public apex (soft check - lan dau chua bootstrap SSL apex
          # se return 502/404/000, doc 07 huong dan setup. Sau bootstrap = 200).
          APEX_CODE=$(curl --max-time 10 -sS -o /dev/null -w "%{http_code}" \
            https://trungtamthanhdat.com/ || echo "000")
          echo "FE public apex /: $APEX_CODE"
          case "$APEX_CODE" in
            200) echo "FE public OK";;
            000|404|502|503)
              echo "WARNING: FE public apex chua bootstrap. Doc: docs/07-fe-public-vps.md";;
            *) echo "FE public FAIL voi code: $APEX_CODE"; exit 1;;
          esac

      - name: Notify Telegram (optional)
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TG_BOT_TOKEN:-}" ] || [ -z "${TG_CHAT_ID:-}" ]; then
            echo "Khong cau hinh Telegram - bo qua notify."
            exit 0
          fi
          STATUS="${{ job.status }}"
          ICON="OK"
          [ "$STATUS" != "success" ] && ICON="FAIL"
          MSG="[CRM Tuyen Sinh] Deploy ${ICON} - ${{ github.sha }} - ${{ github.actor }}"
          curl -sS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d text="${MSG}" > /dev/null || true
