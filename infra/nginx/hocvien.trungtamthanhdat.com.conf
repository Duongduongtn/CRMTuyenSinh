# /etc/nginx/sites-available/hocvien.trungtamthanhdat.com
# PWA hoc vien - Nuxt 3 mode SPA/CSR. Build artifact (.output/public) deploy
# boi CI/CD vao /var/www/thanhdat/frontend-student/.output/public/.
#
# API call tu PWA -> https://sale.trungtamthanhdat.com/api/ (cross-origin,
# CORS da whitelist trong config/settings/prod.py).
#
# Neu sau nay chuyen PWA len Cloudflare Pages: go server block nay,
# tro DNS A `hocvien` ve CF, xoa cert hocvien khoi certbot.

server {
    listen 80;
    listen [::]:80;
    server_name hocvien.trungtamthanhdat.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hocvien.trungtamthanhdat.com;

    ssl_certificate     /etc/letsencrypt/live/hocvien.trungtamthanhdat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hocvien.trungtamthanhdat.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_hocvien:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    include /etc/nginx/snippets/thanhdat-security-headers.conf;

    access_log /var/log/nginx/thanhdat-hocvien.access.log;
    error_log  /var/log/nginx/thanhdat-hocvien.error.log warn;

    client_max_body_size 15M;

    root /var/www/thanhdat/frontend-student/.output/public;
    index index.html;

    # PWA can Service Worker + manifest KHONG cache (de update lien tuc).
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Static assets fingerprinted -> cache aggressive.
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
