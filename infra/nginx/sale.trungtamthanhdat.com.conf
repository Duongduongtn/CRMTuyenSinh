# /etc/nginx/sites-available/sale.trungtamthanhdat.com
# CRM admin SPA (Vue 3 + Vite build) + Django REST API + Django admin fallback.
# Backend gunicorn nghe 127.0.0.1:8003 (do compose expose tu container).
#
# Deploy:
#   sudo ln -s /var/www/thanhdat/infra/nginx/sale.trungtamthanhdat.com.conf \
#              /etc/nginx/sites-enabled/sale.trungtamthanhdat.com
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP -> HTTPS redirect + ACME challenge passthrough.
server {
    listen 80;
    listen [::]:80;
    server_name sale.trungtamthanhdat.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sale.trungtamthanhdat.com;

    # SSL - certbot --nginx tu ghi de path sau khi cap cert lan dau.
    ssl_certificate     /etc/letsencrypt/live/sale.trungtamthanhdat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sale.trungtamthanhdat.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_sale:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    include /etc/nginx/snippets/thanhdat-security-headers.conf;

    access_log /var/log/nginx/thanhdat-sale.access.log;
    error_log  /var/log/nginx/thanhdat-sale.error.log warn;

    # Upload toi da 15MB (CCCD anh chinh + sao + suc khoe).
    client_max_body_size 15M;

    # Root cho FE CRM SPA (build artifact rsync vao day boi CI/CD).
    root /var/www/thanhdat/frontend-crm/dist;
    index index.html;

    # ------------------------------------------------------------
    # Backend Django
    # ------------------------------------------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # Django admin fallback (cho superadmin debug, KHONG phai UI chinh).
    location /admin/ {
        proxy_pass         http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
    }

    # Healthcheck Django (route ngoai /api/ - dung cho CI smoke + uptime monitor).
    # KHONG proxy_pass /api/ vi healthz dat o root urls.py (apps/core/views.py).
    location = /healthz/ {
        proxy_pass         http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Webhook root paths cho Casso doi soat QR + FB Lead Ads pull lead.
    # Django route /webhook/casso (apps/payments/urls.py) va /webhook/fb-leadgen
    # (apps/marketing/urls.py) o root, KHONG nam duoi /api/. Phai proxy thu cong.
    location ~ ^/webhook/(casso|fb-leadgen)/?$ {
        proxy_pass         http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_buffering off;
    }

    # Django staticfiles (collectstatic output bind mount tu container).
    location /static/ {
        alias /var/www/thanhdat/backend-static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ------------------------------------------------------------
    # Media: CHI avatar/anh public.
    # File CCCD/suc khoe BAT BUOC qua signed URL view cua apps.documents
    # (xem apps/documents/views.py). Block cung path nhay cam o nginx layer
    # de defense in depth.
    # ------------------------------------------------------------
    location ~* ^/media/(cccd|cccd_files|health|health_certs|sensitive)/ {
        deny all;
        return 403;
    }
    location /media/ {
        alias /var/www/thanhdat/backend-media/;
        expires 7d;
    }

    # ------------------------------------------------------------
    # FE SPA serve
    # ------------------------------------------------------------
    # Static assets fingerprinted by Vite -> cache aggressive.
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback - moi route khong phai file -> tra index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Khoa file an (cho .env, .git, etc).
    location ~ /\.(?!well-known) {
        deny all;
    }
}
