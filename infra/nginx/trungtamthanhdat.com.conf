# /etc/nginx/sites-available/trungtamthanhdat.com
# FE public Nuxt 3 hybrid SSR. Apex + www.
# - Route prerender (/, /khoa-hoc, /tin-tuc, /lien-he) Nitro tu serve static HTML
#   tu .output/public/ qua node process - khong can nginx try_files static.
# - Route SSR (/dh/[token]) Nitro render runtime.
# - Nginx host proxy_pass 127.0.0.1:3104 (do thanhdat-frontend-public-ssr expose).
#
# Deploy:
#   sudo ln -s /var/www/thanhdat/infra/nginx/trungtamthanhdat.com.conf \
#              /etc/nginx/sites-enabled/trungtamthanhdat.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL lan dau:
#   sudo certbot --nginx -d trungtamthanhdat.com -d www.trungtamthanhdat.com

# www -> apex 301.
server {
    listen 80;
    listen [::]:80;
    server_name www.trungtamthanhdat.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://trungtamthanhdat.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.trungtamthanhdat.com;

    ssl_certificate     /etc/letsencrypt/live/trungtamthanhdat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trungtamthanhdat.com/privkey.pem;

    return 301 https://trungtamthanhdat.com$request_uri;
}

# HTTP apex -> HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name trungtamthanhdat.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS apex.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trungtamthanhdat.com;

    ssl_certificate     /etc/letsencrypt/live/trungtamthanhdat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trungtamthanhdat.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_apex:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    include /etc/nginx/snippets/thanhdat-security-headers.conf;

    access_log /var/log/nginx/thanhdat-public.access.log;
    error_log  /var/log/nginx/thanhdat-public.error.log warn;

    # FE public chi capture lead form + bao mat thap, 5MB du.
    client_max_body_size 5M;

    # Nitro tu phan biet static vs SSR -> proxy thang het.
    location / {
        proxy_pass         http://127.0.0.1:3104;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        # SSE/streaming khong dung cho FE public, tat buffering de don gian.
        proxy_buffering off;
    }

    # Asset Nuxt build duoc fingerprint trong /_nuxt/ -> cache aggressive.
    # Khong tach try_files static vi Nitro tu serve, chi them header cache.
    location /_nuxt/ {
        proxy_pass         http://127.0.0.1:3104;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_valid  200 30d;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    # Khoa file an.
    location ~ /\.(?!well-known) {
        deny all;
    }
}
