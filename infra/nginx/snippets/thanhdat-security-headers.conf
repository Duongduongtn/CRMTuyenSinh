# Snippet security headers - include cho moi server block thanhdat-*.
# CSP do Django middleware (apps.core.middleware.SimpleCSPMiddleware) quan ly,
# nginx KHONG override CSP de tranh nhan doi header.

add_header Strict-Transport-Security "max-age=2592000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self), payment=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
